<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Админка</title>
    <link rel="stylesheet" href="/static/admin.css">
</head>
<body>
    <div class="page">
        <header class="topbar">
            <div class="topbar-row">
                <h1 class="topbar-title">Админка</h1>
                <button class="btn btn-primary btn-small" id="refresh-btn">Обновить</button>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Пользователи</div>
                    <div class="stat-value" id="stat-users">0</div>
                </div>

                <div class="stat-card">
                    <div class="stat-label">Устройства</div>
                    <div class="stat-value" id="stat-devices">0</div>
                </div>

                <div class="stat-card">
                    <div class="stat-label">Суммарная скорость</div>
                    <div class="stat-value" id="stat-speed">0</div>
                </div>

                <button class="stat-card stat-card-action" id="add-btn">+</button>
            </div>

            <nav class="tabs">
                <button class="tab active" data-tab="users">Пользователи</button>
                <button class="tab" data-tab="devices">Устройства</button>
                <button class="tab" data-tab="payments">Оплаты</button>
            </nav>
        </header>

        <main class="content">
            <section class="tab-panel active" id="users-panel">
                <div class="entity-list" id="users-list"></div>
            </section>

            <section class="tab-panel" id="devices-panel">
                <div class="entity-list" id="devices-list"></div>
            </section>

            <section class="tab-panel" id="payments-panel">
                <div class="entity-list" id="payments-list"></div>
            </section>
        </main>
    </div>

    
    <div class="modal-root" id="modal-root">
        <div class="modal-overlay" id="modal-overlay"></div>

        <!-- МОДАЛКА ПОЛЬЗОВАТЕЛЯ -->
        <div class="modal hidden" id="user-modal">
            <div class="modal-head">
                <div class="modal-head-left">
                    <div class="modal-id" id="user-modal-id">ID 0</div>

                    <div class="status-badge" id="user-modal-status">
                        <span class="status-dot status-active"></span>
                        <span>active</span>
                    </div>
                </div>

                <button class="close-btn" data-close-top>✕</button>
            </div>

            <div class="form-grid">
                <div class="field">
                    <label for="user-name">Имя</label>
                    <input class="input" id="user-name" type="text" />
                </div>

                <div class="field">
                    <label for="user-role">Роль</label>
                    <select class="select" id="user-role"></select>
                </div>

                <div class="grid-2">
                    <div class="field">
                        <label for="user-created-at">Дата создания</label>
                        <input class="input" id="user-created-at" type="text" placeholder="15.02.2026" />
                    </div>

                    <div class="field">
                        <label for="user-next-payment">Дата след. оплаты</label>
                        <input class="input" id="user-next-payment" type="text" placeholder="15.02.2026" />
                    </div>
                </div>

                <div class="grid-2">
                    <div class="field">
                        <label for="user-balance">Баланс</label>
                        <input class="input" id="user-balance" type="number" step="0.01" />
                    </div>

                    <div class="field">
                        <label for="user-monthly-fee">Ежемесячное списание</label>
                        <input class="input" id="user-monthly-fee" type="number" step="0.01" min="0" />
                    </div>
                </div>

                <div class="field">
                    <label for="user-speed">Скорость</label>
                    <input class="input" id="user-speed" type="number" step="1" min="0" />
                </div>

                <div>
                    <div class="section-head">
                        <h3 class="section-title">Устройства</h3>
                        <button class="btn btn-secondary btn-small" id="user-add-device-btn">+ Устройство</button>
                    </div>

                    <div class="strip-list" id="user-devices-strip"></div>
                </div>

                <div class="modal-actions">
                    <button class="btn btn-primary" id="save-user-btn">Сохранить</button>
                    <button class="btn btn-secondary" id="user-payments-history-btn">История платежей</button>
                    <button class="btn btn-danger" id="delete-user-btn">Удалить</button>
                </div>
            </div>
        </div>

        <!-- МОДАЛКА СОЗДАНИЯ ПОЛЬЗОВАТЕЛЯ -->
        <div class="modal hidden" id="user-create-modal">
            <div class="modal-head">
                <div class="modal-head-left">
                    <div class="modal-id">Новый пользователь</div>
                </div>
                <button class="close-btn" data-close-top>✕</button>
            </div>

            <div class="form-grid">
                <div class="field">
                    <label>Имя</label>
                    <input class="input" id="create-user-name" type="text" placeholder="Устройство"/>
                </div>

                <div class="field">
                    <label>Роль</label>
                    <select class="select" id="create-user-role"></select>
                </div>

                <div class="grid-2">
                    <div class="field">
                        <label>Баланс</label>
                        <input class="input" id="create-user-balance" type="number" step="0.01" />
                    </div>

                    <div class="field">
                        <label>Ежемесячный платёж</label>
                        <input class="input" id="create-user-fee" type="number" step="0.01" />
                    </div>
                </div>

                <div class="field">
                    <label>Скорость</label>
                    <input class="input" id="create-user-speed" type="number" />
                </div>

                <div class="modal-actions">
                    <button class="btn btn-primary" id="create-user-btn">Создать</button>
                </div>
            </div>
        </div>

        <!-- МОДАЛКА ПРОСМОТРА УСТРОЙСТВА -->
        <div class="modal hidden" id="device-modal">
            <div class="modal-head">
                <div class="modal-head-left">
                    <div class="modal-id" id="device-modal-id">ID 0</div>

                    <div class="status-badge" id="device-modal-status">
                        <span class="status-dot status-active"></span>
                        <span>active</span>
                    </div>
                </div>

                <button class="close-btn" data-close-top>✕</button>
            </div>

            <div class="form-grid">
                <div class="field">
                    <label for="device-view-name">Имя устройства</label>
                    <input class="input" id="device-view-name" type="text" readonly />
                </div>

                <div class="grid-2">
                    <div class="field">
                        <label for="device-view-owner-id">ID владельца</label>
                        <input class="input" id="device-view-owner-id" type="number" readonly />
                    </div>

                    <div class="field">
                        <label for="device-view-ip">IP</label>
                        <input class="input" id="device-view-ip" type="text" readonly />
                    </div>
                </div>

                <div class="field">
                    <label for="device-view-public-key">Публичный ключ</label>
                    <input class="input" id="device-view-public-key" type="text" readonly />
                </div>

                <div class="modal-actions">
                    <button class="btn btn-danger" id="delete-device-btn">Удалить</button>
                    <button class="btn btn-secondary" data-close-top>Закрыть</button>
                </div>
            </div>
        </div>

        <!-- НОВАЯ МОДАЛКА СОЗДАНИЯ УСТРОЙСТВА -->
        <div class="modal hidden" id="device-create-modal">
            <div class="modal-head">
                <div class="modal-head-left">
                    <div class="modal-id">Новое устройство</div>
                </div>

                <button class="close-btn" data-close-top>✕</button>
            </div>

            <div class="form-grid">
                <div class="field">
                    <label for="device-create-name">Имя устройства</label>
                    <input class="input" id="device-create-name" type="text" placeholder="Устройство" />
                </div>

                <div class="grid-2">
                    <div class="field">
                        <label for="device-create-owner-id">ID владельца</label>
                        <input class="input" id="device-create-owner-id" type="number" readonly />
                    </div>

                    <div class="field">
                        <label for="device-create-ip-suffix">IP (последнее число)</label>
                        <input class="input" id="device-create-ip-suffix" type="number" step="1" min="0" max="255" placeholder="0 = авто" />
                    </div>
                </div>

                <div class="field">
                    <label class="checkbox-row">
                        <input type="checkbox" id="device-create-has-own-key" />
                        Есть свой публичный ключ
                    </label>
                </div>

                <div class="field hidden" id="device-create-public-key-field">
                    <label for="device-create-public-key">Публичный ключ</label>
                    <input class="input" id="device-create-public-key" type="text" placeholder="Base64 public key" />
                </div>

                <div class="field hidden" id="device-create-ip-preview-field">
                    <label for="device-create-ip-preview">Полный IP</label>
                    <input class="input" id="device-create-ip-preview" type="text" readonly />
                </div>

                <div class="modal-actions">
                    <button class="btn btn-primary" id="create-device-btn">Создать устройство</button>
                </div>
            </div>
        </div>

        <!-- МОДАЛКА ИСТОРИИ ПЛАТЕЖЕЙ -->
        <div class="modal hidden" id="payment-history-modal">
            <div class="modal-head">
                <div class="modal-head-left">
                    <div class="modal-id" id="payment-history-user-id">Платежи пользователя ID 0</div>
                </div>

                <button class="close-btn" data-close-top>✕</button>
            </div>

            <div class="section-head">
                <h3 class="section-title">История платежей</h3>
                <button class="btn btn-secondary btn-small" id="add-payment-btn">+ Оплата</button>
            </div>

            <div class="strip-list" id="user-payments-strip"></div>
        </div>

        <!-- МОДАЛКА ПЛАТЕЖА -->
        <div class="modal hidden" id="payment-modal">
            <div class="modal-head">
                <div class="modal-head-left">
                    <div class="modal-id" id="payment-modal-id">ID 0</div>
                </div>

                <button class="close-btn" data-close-top>✕</button>
            </div>

            <div class="form-grid">
                <div class="field">
                    <label for="payment-comment">Комментарий</label>
                    <input class="input" id="payment-comment" type="text" />
                </div>

                <div class="grid-2">
                    <div class="field">
                        <label for="payment-date">Дата</label>
                        <input class="input" id="payment-date" type="text" placeholder="15.02.2026" />
                    </div>

                    <div class="field">
                        <label for="payment-amount">Сумма</label>
                        <input class="input" id="payment-amount" type="number" step="0.01" />
                    </div>
                </div>

                <div class="modal-actions">
                    <button class="btn btn-primary" id="save-payment-btn">Сохранить</button>
                    <button class="btn btn-danger" id="delete-payment-btn">Удалить</button>
                </div>
            </div>
        </div>

        <!-- МОДАЛКА ПОДТВЕРЖДЕНИЯ -->
        <div class="modal hidden" id="confirm-modal">
            <div class="modal-head">
                <div class="modal-head-left">
                    <div class="modal-id">Подтверждение</div>
                </div>

                <button class="close-btn" data-close-top>✕</button>
            </div>

            <div class="form-grid">
                <div id="confirm-text">Вы уверены?</div>

                <div class="confirm-actions">
                    <button class="btn btn-danger" id="confirm-yes-btn">Да</button>
                    <button class="btn btn-secondary" id="confirm-no-btn">Нет</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/admin.js"></script>
</body>
</html>
